name: Publish Docker Image

# Trigger on pushes to main that modify the service_version.txt, or manually
on:
  push:
    branches:
      - main
    paths:
      - 'docker/service_version.txt'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to create the Git tag & release
      packages: write   # to push to GHCR

    steps:
      - name: Check out the repo
        uses: actions/checkout@v3

      - name: Set up QEMU (for multi-platform)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: echo "SERVICE_VERSION=$(cat docker/service_version.txt)" >> $GITHUB_OUTPUT

      - name: Build & tag image
        # bin/build-image will tag both $VERSION and latest
        env:
          VERSION: ${{ steps.version.outputs.SERVICE_VERSION }}
        run: |
          chmod +x bin/build-image
          bin/build-image $VERSION

      - name: Push Docker image
        env:
          VERSION: ${{ steps.version.outputs.SERVICE_VERSION }}
        run: |
          docker push ghcr.io/nasa/harmony-filtering:${VERSION}
          docker push ghcr.io/nasa/harmony-filtering:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.SERVICE_VERSION }}
          name: Release v${{ steps.version.outputs.SERVICE_VERSION }}
          body: |
            See CHANGELOG for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
